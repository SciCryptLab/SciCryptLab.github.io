<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile · SciCrypt Portal</title>
    <link rel="icon" type="image/png" href="../../assets/img/scicrypt-mark.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../../assets/css/chrome.css" rel="stylesheet">
<script>
    // Apply saved theme synchronously to prevent flash of dark content.
(function () {
    try {
        if (localStorage.getItem("theme") === "light") {
            document.documentElement.classList.add("theme-light");
            // The body element isn't parsed yet (this script runs in <head>).
            // Use a MutationObserver to add the class to <body> the instant
            // it's appended, before any body content is painted.
            new MutationObserver(function (_, obs) {
                if (document.body) {
                    document.body.classList.add("theme-light");
                    obs.disconnect();
                }
            }).observe(document.documentElement, { childList: true, subtree: true });
        }
    } catch (e) {}
})();
</script>
</head>
<body class="theme-glass" data-app="portal" data-active="profile">
<nav id="chrome-sidebar"></nav>
<main class="main-content">
    <div id="chrome-topbar"></div>
    <div class="page-heading"><h1>Profile</h1><p>Edit your display name and email. Username and role are managed by the admin.</p></div>

    <div class="card shadow-sm" style="max-width: 700px;">
        <div class="card-body">
            <form data-demo-redirect="profile.html" data-demo-msg="Saving…" onsubmit="return false;">
                <div class="mb-3">
                    <label class="form-label fw-bold">Full name</label>
                    <input type="text" class="form-control" id="f-name">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input type="email" class="form-control" id="f-email">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" class="form-control" disabled id="f-user">
                    <div class="form-text text-muted">Managed by the admin — cannot be changed here.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Role</label>
                    <input type="text" class="form-control" disabled id="f-role">
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Save changes</button>
            </form>
        </div>
    </div>
</main>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/chrome.js"></script>
<script src="../../assets/js/demo-router.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const role = sessionStorage.getItem("demoRole") || "editor";
  const map = { author: ["Alex Chen", "alex.chen@uni-heidelberg.de", "alex-chen"], editor: ["Maria Torres", "editor@example.org", "maria-torres"], reviewer: ["James Park", "reviewer@example.org", "james-park"] }[role];
  document.getElementById("f-name").value = map[0];
  document.getElementById("f-email").value = map[1];
  document.getElementById("f-user").value = map[2];
  document.getElementById("f-role").value = role.charAt(0).toUpperCase() + role.slice(1);
});
</script>
</body>
</html>
