<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · SciCrypt Portal</title>
    <link rel="icon" type="image/png" href="../../assets/img/scicrypt-mark.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../../assets/css/chrome.css" rel="stylesheet">
    <style>
      body.login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
      .login-card { width: 100%; max-width: 420px; background: rgba(17,24,39,0.75); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; padding: 2.5rem; backdrop-filter: blur(20px); }
      .login-card .brand { display: flex; align-items: center; gap: 0.85rem; margin-bottom: 1.5rem; justify-content: center; }
      .login-card .brand .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg,#2563eb,#06b6d4,#22c55e); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(37,99,235,0.35); }
      .login-card .brand .brand-text { font-size: 1.6rem; font-weight: 800; }
      .login-card h2 { color: white; font-weight: 700; margin: 0 0 0.5rem; font-size: 1.4rem; text-align: center; }
      .login-card .sub { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.88rem; margin-bottom: 2rem; }
      .demo-quick { background: rgba(37,99,235,0.12); border: 1px solid rgba(37,99,235,0.35); border-radius: 0.75rem; padding: 1rem; margin-bottom: 1.5rem; }
      .demo-quick .demo-quick-label { color: rgba(255,255,255,0.7); font-size: 0.78rem; margin-bottom: 0.75rem; font-weight: 600; }
      .demo-quick .role-btn { width: 100%; text-align: left; margin-bottom: 0.4rem; }
      .demo-quick .role-btn:last-child { margin-bottom: 0; }
    </style>
<script>
    // Apply saved theme synchronously to prevent flash of dark content.
(function () {
    try {
        if (localStorage.getItem("theme") === "light") {
            document.documentElement.classList.add("theme-light");
            // The body element isn't parsed yet (this script runs in <head>).
            // Use a MutationObserver to add the class to <body> the instant
            // it's appended, before any body content is painted.
            new MutationObserver(function (_, obs) {
                if (document.body) {
                    document.body.classList.add("theme-light");
                    obs.disconnect();
                }
            }).observe(document.documentElement, { childList: true, subtree: true });
        }
    } catch (e) {}
})();
</script>
</head>
<body class="theme-glass login">

<div class="login-card">
    <div class="brand">
        <div class="logo-icon"><img src="../../assets/img/scicrypt-mark.png" alt="SciCrypt" style="width:100%;height:100%;object-fit:contain;"></div>
        <span class="brand-text"><span style="background: linear-gradient(135deg,#2563eb,#06b6d4,#22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Sci</span><span style="font-family:'Nothing','Montserrat',sans-serif;font-weight:400;background: linear-gradient(135deg,#2563eb,#06b6d4,#22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Crypt</span></span>
    </div>
    <h2>Welcome back</h2>
    <div class="sub">Sign in to the Portal</div>

    <div class="demo-quick">
        <div class="demo-quick-label"><i class="fas fa-bolt me-1 text-info"></i>Quick sign-in</div>
        <button class="btn btn-outline-primary btn-sm role-btn" onclick="demoLoginAs('author')"><i class="fas fa-flask me-2"></i>Sign in as researcher</button>
        <button class="btn btn-outline-primary btn-sm role-btn" onclick="demoLoginAs('editor')"><i class="fas fa-user-tie me-2"></i>Sign in as editor</button>
        <button class="btn btn-outline-primary btn-sm role-btn" onclick="demoLoginAs('reviewer')"><i class="fas fa-glasses me-2"></i>Sign in as reviewer</button>
    </div>

    <form data-demo-redirect="dashboard.html" data-demo-msg="Signing in…">
        <div class="mb-3">
            <label class="form-label fw-bold">Username</label>
            <input type="text" class="form-control" placeholder="maria-torres">
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <input type="password" class="form-control" placeholder="(anything goes in the simulation)">
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-sign-in-alt me-1"></i>Sign in</button>
        <div class="text-center mt-3"><a href="../index.html" class="small text-info text-decoration-none">← Back to role picker</a></div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/chrome.js"></script>
<script src="../../assets/js/demo-router.js"></script>
<script>
function demoLoginAs(role) {
  sessionStorage.setItem("demoRole", role);
  if (window.demoOverlay) window.demoOverlay.show("Signing in as " + role + "…");
  setTimeout(function () { window.location.href = "dashboard.html"; }, 600);
}
</script>
</body>
</html>
