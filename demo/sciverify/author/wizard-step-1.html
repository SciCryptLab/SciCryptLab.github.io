<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1 — Type, Title &amp; Abstract · SciVerify</title>
    <link rel="icon" type="image/png" href="../../../assets/img/scicrypt-mark.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../../../assets/css/chrome.css" rel="stylesheet">
    <style>
      .step-nav { background: rgba(17,24,39,0.55); border: 1px solid rgba(255,255,255,0.08); border-radius: 1rem; padding: 1.5rem; position: sticky; top: 1rem; }
      .step-nav .step-item { display: flex; gap: 0.85rem; padding: 0.6rem 0.5rem; border-radius: 0.5rem; color: rgba(255,255,255,0.55); font-size: 0.88rem; }
      .step-nav .step-item.active { background: rgba(37,99,235,0.18); color: white; font-weight: 600; }
      .step-nav .step-item.done { color: rgba(255,255,255,0.75); }
      .step-nav .step-num { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
      .step-nav .step-item.done .step-num { background: #22c55e; color: white; }
      .step-nav .step-item.active .step-num { background: var(--primary-color); color: white; }
    </style>
<script>
    // Apply saved theme synchronously to prevent flash of dark content.
(function () {
    try {
        if (localStorage.getItem("theme") === "light") {
            document.documentElement.classList.add("theme-light");
            // The body element isn't parsed yet (this script runs in <head>).
            // Use a MutationObserver to add the class to <body> the instant
            // it's appended, before any body content is painted.
            new MutationObserver(function (_, obs) {
                if (document.body) {
                    document.body.classList.add("theme-light");
                    obs.disconnect();
                }
            }).observe(document.documentElement, { childList: true, subtree: true });
        }
    } catch (e) {}
})();
</script>
</head>
<body class="theme-glass" data-app="sciverify" data-active="submissions">
<nav id="chrome-sidebar"></nav>
<main class="main-content">
    <div id="chrome-topbar"></div>
    <div class="page-heading"><h1>New Submission — Step 1 of 6</h1><p>Manuscript metadata</p></div>

    <div class="row g-4">
        <div class="col-lg-3"><div class="step-nav">
            <div class="step-item active"><span class="step-num">1</span><span>Type, Title &amp; Abstract</span></div>
            <div class="step-item"><span class="step-num">2</span><span>Files</span></div>
            <div class="step-item"><span class="step-num">3</span><span>Authors</span></div>
            <div class="step-item"><span class="step-num">4</span><span>Figures &amp; data lineage</span></div>
            <div class="step-item"><span class="step-num">5</span><span>Referee preferences</span></div>
            <div class="step-item"><span class="step-num">6</span><span>Declarations</span></div>
            <div class="step-item"><span class="step-num">7</span><span>Review &amp; submit</span></div>
        </div></div>
        <div class="col-lg-9">
            <div class="alert" style="background:rgba(37,99,235,0.12);border:1px solid rgba(37,99,235,0.35);color:rgba(255,255,255,0.85);"><i class="fas fa-info-circle me-2 text-info"></i><strong>Manuscript Metadata.</strong> Tell us what kind of paper this is.</div>
            <form data-demo-redirect="wizard-step-2.html" data-demo-msg="Saving step 1…">
                <div class="card shadow-sm mb-3"><div class="card-body">
                    <label class="form-label fw-bold">Manuscript type</label>
                    <div class="d-flex flex-wrap" style="gap:1rem;">
                        <div class="form-check"><input class="form-check-input" type="radio" name="t" id="t1" checked><label class="form-check-label" for="t1">Paper</label></div>
                        <div class="form-check"><input class="form-check-input" type="radio" name="t" id="t2"><label class="form-check-label" for="t2">Critical Review</label></div>
                        <div class="form-check"><input class="form-check-input" type="radio" name="t" id="t3"><label class="form-check-label" for="t3">Communication</label></div>
                        <div class="form-check"><input class="form-check-input" type="radio" name="t" id="t4"><label class="form-check-label" for="t4">Perspective</label></div>
                    </div>
                </div></div>

                <div class="card shadow-sm mb-3"><div class="card-body">
                    <label class="form-label fw-bold">Title <span class="text-muted">(max 50 words)</span></label>
                    <textarea class="form-control" rows="2">Comparing water quality across three river sampling sites</textarea>
                    <div class="small text-muted mt-1">8 / 50 words</div>
                </div></div>

                <div class="card shadow-sm mb-3"><div class="card-body">
                    <label class="form-label fw-bold">Abstract <span class="text-muted">(max 350 words)</span></label>
                    <textarea class="form-control" rows="8">We compare basic water-quality indicators — pH, turbidity, and a model contaminant — across three river sampling sites using a synthetic-data pipeline. Measurements show clear differences between sites, with the downstream site showing the highest contaminant concentration. All figures and data shown here are part of a public software demonstration and do not correspond to a real study.</textarea>
                    <div class="small text-muted mt-1">62 / 350 words</div>
                </div></div>

                <div class="d-flex justify-content-between">
                    <a href="submissions.html" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save &amp; Continue <i class="fas fa-arrow-right ms-1"></i></button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../../assets/js/chrome.js"></script>
<script src="../../../assets/js/demo-router.js"></script>
</body>
</html>
