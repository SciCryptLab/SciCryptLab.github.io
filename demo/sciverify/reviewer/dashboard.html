<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviewer Dashboard · SciVerify</title>
    <link rel="icon" type="image/png" href="../../../assets/img/scicrypt-mark.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../../../assets/css/chrome.css" rel="stylesheet">
<script>
    // Apply saved theme synchronously to prevent flash of dark content.
(function () {
    try {
        if (localStorage.getItem("theme") === "light") {
            document.documentElement.classList.add("theme-light");
            // The body element isn't parsed yet (this script runs in <head>).
            // Use a MutationObserver to add the class to <body> the instant
            // it's appended, before any body content is painted.
            new MutationObserver(function (_, obs) {
                if (document.body) {
                    document.body.classList.add("theme-light");
                    obs.disconnect();
                }
            }).observe(document.documentElement, { childList: true, subtree: true });
        }
    } catch (e) {}
})();
</script>
</head>
<body class="theme-glass" data-app="sciverify" data-active="dashboard">
<nav id="chrome-sidebar"></nav>
<main class="main-content">
    <div id="chrome-topbar"></div>

    <div class="welcome-banner">
        <div class="welcome-avatar">R</div>
        <div class="welcome-text"><h2>Welcome back, James Park</h2><p>1 pending assignment. Linked data lifecycle is available alongside the manuscript.</p></div>
    </div>

    <div class="page-heading"><h1>Reviewer Dashboard</h1></div>

    <div class="row g-3 mb-4" id="stats"></div>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item"><button class="nav-link active">All</button></li>
        <li class="nav-item"><button class="nav-link">Pending</button></li>
        <li class="nav-item"><button class="nav-link">Accepted</button></li>
        <li class="nav-item"><button class="nav-link">Completed</button></li>
    </ul>

    <div class="card shadow-sm">
        <div class="card-header"><h5 class="mb-0"><i class="fas fa-glasses me-2 text-info"></i>Assignments</h5></div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead><tr><th>Title</th><th>Journal</th><th>Status</th><th>Assigned</th><th>Decision</th><th class="text-end">Actions</th></tr></thead>
                    <tbody id="queue"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../../assets/js/chrome.js"></script>
<script src="../../../assets/js/demo-data.js"></script>
<script src="../../../assets/js/demo-router.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const d = window.DEMO;
  const r = d.reviewerStats;
  const card = (label, val, icon, bg) => `<div class="col-md col-6"><div class="stat-card d-flex justify-content-between align-items-center">
    <div><div class="stat-label">${label}</div><div class="stat-value">${val}</div></div>
    <div class="stat-icon" style="background:${bg};"><i class="fas ${icon}"></i></div>
  </div></div>`;
  document.getElementById("stats").innerHTML = [
    card("Total assignments", r.total, "fa-glasses", "linear-gradient(135deg,#2563eb,#06b6d4)"),
    card("Pending", r.pending, "fa-clock", "linear-gradient(135deg,#f59e0b,#dc2626)"),
    card("Accepted", r.accepted, "fa-handshake", "linear-gradient(135deg,#6366f1,#06b6d4)"),
    card("Completed", r.completed, "fa-check-circle", "linear-gradient(135deg,#059669,#22c55e)"),
  ].join("");

  const statusBadge = (st) => ({
    pending: '<span class="badge" style="background:rgba(251,191,36,0.18);color:#fbbf24;border:1px solid rgba(251,191,36,0.35);">pending</span>',
    accepted: '<span class="badge" style="background:rgba(37,99,235,0.18);color:#93c5fd;border:1px solid rgba(37,99,235,0.35);">accepted</span>',
    completed: '<span class="badge" style="background:rgba(5,150,105,0.18);color:#34d399;border:1px solid rgba(5,150,105,0.35);">completed</span>',
  }[st] || st);

  document.getElementById("queue").innerHTML = d.reviewerQueue.map((r, i) => `
    <tr>
      <td><div style="font-weight:600;color:white;">${r.title}</div></td>
      <td>${r.journal}</td>
      <td>${statusBadge(r.status)}</td>
      <td>${r.assigned_at}</td>
      <td>${r.reviewer_decision || '<span class="text-muted">—</span>'}</td>
      <td class="text-end">
        ${i === 0 ? `<a href="assignment.html" class="btn btn-sm btn-primary"><i class="fas fa-eye me-1"></i>Open</a>` : `<button class="btn btn-sm btn-outline-secondary" disabled><i class="fas fa-eye me-1"></i>Open</button>`}
      </td>
    </tr>
  `).join("");
});
</script>
</body>
</html>
